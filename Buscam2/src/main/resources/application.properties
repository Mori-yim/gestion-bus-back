spring.application.name=Buscam2


# CONFIGURATION PRINCIPALE - BusCam Backend
# IMPORTANT : En production, ces valeurs sensibles doivent être
# définies comme VARIABLES D'ENVIRONNEMENT (Railway, Render, etc.)
# Ne jamais committer des mots de passe réels sur GitHub !

# SERVEUR
server.port=8080

# Préfixe global pour tous les endpoints : /api/v1/...
# Permet de versionner l'API facilement
spring.mvc.servlet.path=/

# BASE DE DONNÉES POSTGRESQL (SUPABASE)
# En local : remplace par ta connection string Supabase
# Sur Railway : ces valeurs viennent des variables d'environnement

# Format Supabase : jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/buscam_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP (Spring Boot l'utilise par défaut)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / HIBERNATE
# update : met à jour le schéma sans supprimer les données (dev)
# validate : vérifie seulement (production recommandée)
# create-drop : recrée la BDD à chaque démarrage (tests)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console (utile pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte PostgreSQL pour Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (JSON Web Token)
# IMPORTANT : En production, utiliser une clé secrète forte (256 bits min)
# Génère une clé : openssl rand -base64 64
jwt.secret=${JWT_SECRET:buscam-super-secret-key-for-jwt-minimum-256-bits-required-here}

# Durée de validité du token : 24 heures = 86400000 ms
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (Cross-Origin Resource Sharing)
# Autorise le frontend React (Vercel) à appeler l'API
# En production, remplace * par l'URL exacte de ton frontend Vercel
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://buscam.vercel.app}

# LOGS
logging.level.com.buscam=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# DONNÉES DE TEST INITIALES (DataLoader)
# Active l'injection de données de démo au démarrage
app.load-sample-data=true
