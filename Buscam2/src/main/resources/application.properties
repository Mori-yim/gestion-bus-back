server.port=8080
# PrĂŠfixe global pour tous les endpoints : /api/v1/...
# Permet de versionner l'API facilement
spring.mvc.servlet.path=/

# BASE DE DONNĂES POSTGRESQL (SUPABASE)
# En local : remplace par ta connection string Supabase
# Sur Railway : ces valeurs viennent des variables d'environnement

# Format Supabase : jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions HikariCP (Spring Boot l'utilise par dĂŠfaut)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / HIBERNATE
# update : met Ă  jour le schĂŠma sans supprimer les donnĂŠes (dev)
# validate : vĂŠrifie seulement (production recommandĂŠe)
# create-drop : recrĂŠe la BDD Ă  chaque dĂŠmarrage (tests)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requĂŞtes SQL dans la console (utile pour dĂŠboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte PostgreSQL pour Hibernate
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Dialecte Hibernate pour MySQL 8+ (optimise les requętes SQL générées)
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT (JSON Web Token)
jwt.secret=bWFTdXBlckNsZVNlY3JldGVQb3VySldUMTIzNDU2Nzg5MCE=
 #${JWT_SECRET:buscam-super-secret-key-for-jwt-minimum-256-bits-required-here}
#
## DurĂŠe de validitĂŠ du token : 24 heures = 86400000 ms
jwt.expiration=86400000
  #${JWT_EXPIRATION:86400000}
## CORS (Cross-Origin Resource Sharing)
## Autorise le frontend React (Vercel) Ă  appeler l'API
## En production, remplace * par l'URL exacte de ton frontend Vercel
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://buscam.vercel.app}
#
## LOGS
logging.level.com.buscam=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
#
## DONNĂES DE TEST INITIALES (DataLoader)
## Active l'injection de donnĂŠes de dĂŠmo au dĂŠmarrage
app.load-sample-data=true
