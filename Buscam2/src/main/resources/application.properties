spring.application.name=Buscam2


# CONFIGURATION PRINCIPALE - BusCam Backend
# IMPORTANT : En production, ces valeurs sensibles doivent ÃŠtre
# dÃĐfinies comme VARIABLES D'ENVIRONNEMENT (Railway, Render, etc.)
# Ne jamais committer des mots de passe rÃĐels sur GitHub !

# SERVEUR
server.port=8080

# PrÃĐfixe global pour tous les endpoints : /api/v1/...
# Permet de versionner l'API facilement
spring.mvc.servlet.path=/

# BASE DE DONNÃES POSTGRESQL (SUPABASE)
# En local : remplace par ta connection string Supabase
# Sur Railway : ces valeurs viennent des variables d'environnement

# Format Supabase : jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres
spring.datasource.url=jdbc:postgresql://db.btutpzjuxvjjrsbblijc.supabase.co:6543/postgres?sslmode=require
#jdbc:postgresql://db.btutpzjuxvjjrsbblijc.supabase.co:6543/postgres?sslmode=require
#postgresql://postgres:[morinopostgresql]@db.btutpzjuxvjjrsbblijc.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=morinopostgresql
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP (Spring Boot l'utilise par dÃĐfaut)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / HIBERNATE
# update : met Ã  jour le schÃĐma sans supprimer les donnÃĐes (dev)
# validate : vÃĐrifie seulement (production recommandÃĐe)
# create-drop : recrÃĐe la BDD Ã  chaque dÃĐmarrage (tests)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requÃŠtes SQL dans la console (utile pour dÃĐboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte PostgreSQL pour Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (JSON Web Token)
# IMPORTANT : En production, utiliser une clÃĐ secrÃĻte forte (256 bits min)
# GÃĐnÃĻre une clÃĐ : openssl rand -base64 64
jwt.secret=${JWT_SECRET:buscam-super-secret-key-for-jwt-minimum-256-bits-required-here}

# DurÃĐe de validitÃĐ du token : 24 heures = 86400000 ms
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (Cross-Origin Resource Sharing)
# Autorise le frontend React (Vercel) Ã  appeler l'API
# En production, remplace * par l'URL exacte de ton frontend Vercel
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://buscam.vercel.app}

# LOGS
logging.level.com.buscam=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# DONNÃES DE TEST INITIALES (DataLoader)
# Active l'injection de donnÃĐes de dÃĐmo au dÃĐmarrage
app.load-sample-data=true









